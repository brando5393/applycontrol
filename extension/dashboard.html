<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ApplyControl Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/foundation-sites@6.7.5/dist/css/foundation.min.css"
    />
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <header class="top">
      <h1>ApplyControl</h1>
      <div class="right">
        <span id="user-label"></span>
        <button id="sign-out" class="button secondary hidden">Sign out</button>
      </div>
    </header>

    <main class="container">
      <section id="auth-section" class="callout">
        <h2>Sign in</h2>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@email.com" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="********" />
        </div>
        <div class="row">
          <label class="checkbox">
            <input id="remember-me" type="checkbox" checked />
            <span>Remember me</span>
          </label>
        </div>
        <div class="row">
          <button id="sign-in" class="button">Sign in</button>
          <button id="sign-up" class="button secondary">Sign up</button>
        </div>
        <p id="auth-status" class="status"></p>
      </section>

      <section id="app-section" class="callout hidden">
        <div class="row space">
          <div>
            <h2>Applications</h2>
            <p class="meta" id="count"></p>
          </div>
          <div class="filters">
            <input id="search" placeholder="Search title or company" />
          </div>
        </div>
        <div class="row space">
          <p class="meta" id="sync-status"></p>
          <div class="row">
            <button id="refresh" class="button secondary">Refresh</button>
            <button id="clear-all" class="button alert">Clear all</button>
          </div>
        </div>
        <div class="filter-row" id="status-filters"></div>
        <div class="table">
          <div class="table-head">
            <div>Role</div>
            <div>Source</div>
            <div>Captured</div>
            <div>Status</div>
            <div>Link</div>
          </div>
          <div id="list" class="table-body"></div>
        </div>
      </section>
    </main>

    <div id="modal" class="modal hidden">
      <div class="modal-card">
        <h3>Delete all applications?</h3>
        <p class="meta">This cannot be undone.</p>
        <div class="row end">
          <button id="modal-cancel" class="button secondary">Cancel</button>
          <button id="modal-confirm" class="button alert">Delete all</button>
        </div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
